name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 push되면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest # 우분투 최신 버전 가상 환경을 빌려옴

    steps:
    # 1. GitHub 리포지토리에 있는 소스코드 다운로드
    - name: Check out repository code
      uses: actions/checkout@v4

    # 2. Docker Hub 로그인을 위한 계정 인증
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }} # 내 도커 허브 ID
        password: ${{ secrets.DOCKERHUB_TOKEN }}    # 내 도커 허브 Access Token

    # 3. 도커 이미지 빌드 및 푸시를 동시에 진행
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: sswujmc/grow-mission:latest # 내 저장소 이름과 태그
	no-cache: true
