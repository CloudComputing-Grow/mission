apiVersion: apps/v1
kind: Deployment
metadata:
  name: grow-redis-deployment
  labels:
    app: grow-redis
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: grow-redis
  template:
    metadata:
      labels:
        app: grow-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine 
        ports:
        - containerPort: 6379 
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: grow-redis-service 
spec:
  type: ClusterIP # 외부 노출 없이 쿠버네티스 내부 망 안에서만 통신하도록 보안 설정
  selector:
    app: grow-redis
  ports:
    - protocol: TCP
      port: 6379       
      targetPort: 6379 
